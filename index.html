<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="">
	<meta name="author" content="Nittaku-WP">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title></title>
</head>
<body>
	<div class="app-shell">

		<header class="app-header">
    		<h1>DeepSeaToDo V2</h1>
			<p class="subtitle">深海のように静かに、目の前のことを積む。</p>
		</header>

    	<main class="app-main">

			<section class="input-panel">
				<input id="todo-input" placeholder="やることを書く">

				<select id="category-input">
					<option value="">カテゴリを選択</option>
					<option value="生活">生活</option>
					<option value="仕事">仕事</option>
					<option value="勉強">勉強</option>
				</select>

				<input type="date" id="deadline-input">
				<button id="add-btn">追加</button>
			</section>

			<section class="status-panel">
				<p id="todo-count"></p>
			</section>

			<section class="filter-panel">
				<div id="filter-buttons">
					<button data-filter="all">すべて</button>
					<button data-filter="生活">生活</button>
					<button data-filter="仕事">仕事</button>
					<button data-filter="勉強">勉強</button>
				</div>
			</section>

			<section class="list-panel">
				<ul id="todo-list"></ul>
			</section>

		</main>

		<footer>
			<p>&copy; Nittaku-WP</p>
		</footer>

	</div>

    <script src="script.js"></script>
	
</body>
</html>
